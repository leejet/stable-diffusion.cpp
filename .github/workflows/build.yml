name: CI

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create new release"
        required: true
        type: boolean
      ggml_release_tag:
        description: "Prebuilt ggml SDK release tag"
        required: false
        default: "v0.14.0"
        type: string
  push:
    branches:
      - master
      - ci
    paths:
      [
        ".github/workflows/**",
        "cmake/**",
        ".dockerignore",
        "Dockerfile*",
        "**/CMakeLists.txt",
        "**/Makefile",
        "**/*.h",
        "**/*.hpp",
        "**/*.c",
        "**/*.cpp",
        "**/*.cu",
        "examples/server/frontend",
        "examples/server/frontend/**",
      ]
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      [
        ".github/workflows/**",
        "cmake/**",
        ".dockerignore",
        "Dockerfile*",
        "**/CMakeLists.txt",
        "**/Makefile",
        "**/*.h",
        "**/*.hpp",
        "**/*.c",
        "**/*.cpp",
        "**/*.cu",
        "examples/server/frontend",
        "examples/server/frontend/**",
      ]

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  GGML_RELEASE_BASE_URL: https://github.com/seasonjs/ggml.cpp-build/releases/download
  GGML_RELEASE_TAG: ${{ github.event.inputs.ggml_release_tag || 'v0.14.0' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-22.04

    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build zip

      - name: Cache prebuilt ggml SDK
        uses: actions/cache@v4
        with:
          path: .cache/ggml
          key: ggml-prebuilt-${{ runner.os }}-${{ runner.arch }}-${{ env.GGML_RELEASE_TAG }}

      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DSD_BUILD_SHARED_LIBS=ON \
            -DSD_USE_PREBUILT_GGML=ON \
            -DGGML_BACKEND_DL=ON \
            -DGGML_RELEASE_BASE_URL="${GGML_RELEASE_BASE_URL}" \
            -DGGML_RELEASE_TAG="${GGML_RELEASE_TAG}" \
            -DGGML_CACHE_DIR="${GITHUB_WORKSPACE}/.cache/ggml"

      - name: Build
        run: cmake --build build --config Release -j "$(nproc)"

      - name: Pack artifacts
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event.inputs.create_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          short="$(git rev-parse --short HEAD)"
          safe_branch="${BRANCH_NAME//\//-}"
          stage="artifact/sd-linux-x86_64"
          archive="artifact/sd-${safe_branch}-${short}-bin-linux-x86_64.zip"

          rm -rf artifact
          mkdir -p "$stage"
          cp -a build/bin/. "$stage/"
          cp ggml/LICENSE "$stage/ggml.txt"
          cp LICENSE "$stage/stable-diffusion.cpp.txt"
          printf '%s\n' \
            "platform=linux-x86_64" \
            "ggml_release_base_url=${GGML_RELEASE_BASE_URL}" \
            "ggml_release_tag=${GGML_RELEASE_TAG}" \
            "ggml_linkage=prebuilt-sdk" \
            > "$stage/SDK-METADATA.txt"

          (cd artifact && zip -y -r "$(basename "$archive")" sd-linux-x86_64)

      - name: Upload artifacts
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event.inputs.create_release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: sd-linux-x86_64
          path: artifact/*.zip
          if-no-files-found: error

  build-and-push-docker-images:
    name: Build and push container images
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    strategy:
      matrix:
        variant: [musa, sycl, vulkan, cuda]
        platform: [linux/amd64]
        runner: [ubuntu-latest]
        build-args: [""]
        tag-suffix: [""]
        include:
          - variant: cuda
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            tag-suffix: "-spark"
            build-args: |
              CUDA_VERSION=13.0.0
              UBUNTU_VERSION=24.04
              CUDA_ARCHITECTURES=121
              GGML_CUDA_FA_ALL_QUANTS=ON

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Get commit hash
        id: commit
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/master' ) || github.event.inputs.create_release == 'true' }}
        uses: prompt/actions-commit-hash@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/master' ) || github.event.inputs.create_release == 'true' }}
          file: Dockerfile.${{ matrix.variant }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BRANCH_NAME }}-${{ matrix.variant }}${{ matrix.tag-suffix }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: ${{ matrix.build-args }}

  build-macos-arm64:
    runs-on: macos-14

    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Dependencies
        run: brew install cmake ninja zip

      - name: Cache prebuilt ggml SDK
        uses: actions/cache@v4
        with:
          path: .cache/ggml
          key: ggml-prebuilt-${{ runner.os }}-${{ runner.arch }}-${{ env.GGML_RELEASE_TAG }}

      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DCMAKE_INSTALL_RPATH="@loader_path" \
            -DSD_BUILD_SHARED_LIBS=ON \
            -DSD_USE_PREBUILT_GGML=ON \
            -DGGML_BACKEND_DL=ON \
            -DGGML_RELEASE_BASE_URL="${GGML_RELEASE_BASE_URL}" \
            -DGGML_RELEASE_TAG="${GGML_RELEASE_TAG}" \
            -DGGML_CACHE_DIR="${GITHUB_WORKSPACE}/.cache/ggml"

      - name: Build
        run: cmake --build build --config Release -j "$(sysctl -n hw.ncpu)"

      - name: Pack artifacts
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event.inputs.create_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          short="$(git rev-parse --short HEAD)"
          safe_branch="${BRANCH_NAME//\//-}"
          stage="artifact/sd-macos-arm64"
          archive="artifact/sd-${safe_branch}-${short}-bin-macos-arm64.zip"

          rm -rf artifact
          mkdir -p "$stage"
          cp -a build/bin/. "$stage/"
          cp ggml/LICENSE "$stage/ggml.txt"
          cp LICENSE "$stage/stable-diffusion.cpp.txt"
          printf '%s\n' \
            "platform=macos-arm64" \
            "ggml_release_base_url=${GGML_RELEASE_BASE_URL}" \
            "ggml_release_tag=${GGML_RELEASE_TAG}" \
            "ggml_linkage=prebuilt-sdk" \
            > "$stage/SDK-METADATA.txt"

          (cd artifact && zip -y -r "$(basename "$archive")" sd-macos-arm64)

      - name: Upload artifacts
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event.inputs.create_release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: sd-macos-arm64
          path: artifact/*.zip
          if-no-files-found: error

  build-windows-x86_64:
    runs-on: windows-2022

    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Cache prebuilt ggml SDK
        uses: actions/cache@v4
        with:
          path: .cache/ggml
          key: ggml-prebuilt-${{ runner.os }}-${{ runner.arch }}-${{ env.GGML_RELEASE_TAG }}

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -A x64 `
            -DCMAKE_CXX_FLAGS="/bigobj" `
            -DSD_BUILD_SHARED_LIBS=ON `
            -DSD_USE_PREBUILT_GGML=ON `
            -DGGML_BACKEND_DL=ON `
            -DGGML_RELEASE_BASE_URL="${env:GGML_RELEASE_BASE_URL}" `
            -DGGML_RELEASE_TAG="${env:GGML_RELEASE_TAG}" `
            -DGGML_CACHE_DIR="${env:GITHUB_WORKSPACE}\.cache\ggml"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel $env:NUMBER_OF_PROCESSORS

      - name: Pack artifacts
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event.inputs.create_release == 'true' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $short = git rev-parse --short HEAD
          $safeBranch = $env:BRANCH_NAME -replace '[\\/:"*?<>| ]', '-'
          $binDir = "build\bin\Release"
          if (!(Test-Path $binDir)) {
            $binDir = "build\bin"
          }
          if (!(Test-Path $binDir)) {
            throw "Could not find build output directory"
          }

          $stage = "artifact\sd-windows-x86_64"
          $archive = "artifact\sd-$safeBranch-$short-bin-windows-x86_64.zip"

          if (Test-Path "artifact") {
            Remove-Item -LiteralPath "artifact" -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Path "$binDir\*" -Destination $stage -Recurse -Force
          Copy-Item -Path "ggml\LICENSE" -Destination "$stage\ggml.txt" -Force
          Copy-Item -Path "LICENSE" -Destination "$stage\stable-diffusion.cpp.txt" -Force

          $metadata = @(
            "platform=windows-x86_64",
            "ggml_release_base_url=$env:GGML_RELEASE_BASE_URL",
            "ggml_release_tag=$env:GGML_RELEASE_TAG",
            "ggml_linkage=prebuilt-sdk"
          ) -join "`n"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText((Join-Path (Resolve-Path $stage) "SDK-METADATA.txt"), $metadata, $utf8NoBom)

          Compress-Archive -Path $stage -DestinationPath $archive -Force

      - name: Upload artifacts
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event.inputs.create_release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: sd-windows-x86_64
          path: artifact/*.zip
          if-no-files-found: error

  release:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event.inputs.create_release == 'true' }}

    runs-on: ubuntu-latest

    needs:
      - build-linux-x86_64
      - build-and-push-docker-images
      - build-macos-arm64
      - build-windows-x86_64

    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifact
          pattern: sd-*
          merge-multiple: true

      - name: Get release version
        id: version
        run: |
          echo "count=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create release
        id: create_release
        if: ${{ github.event_name == 'workflow_dispatch' || github.ref_name == 'master' }}
        uses: anzz1/action-create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ format('{0}-{1}-{2}', env.BRANCH_NAME, steps.version.outputs.count, steps.version.outputs.short) }}

      - name: Upload release
        if: ${{ github.event_name == 'workflow_dispatch' || github.ref_name == 'master' }}
        uses: actions/github-script@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const path = require('path');
            const fs = require('fs');
            const release_id = '${{ steps.create_release.outputs.id }}';
            for (const file of await fs.readdirSync('./artifact')) {
              if (path.extname(file) === '.zip') {
                console.log('uploadReleaseAsset', file);
                await github.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id,
                  name: file,
                  data: await fs.readFileSync(`./artifact/${file}`)
                });
              }
            }
